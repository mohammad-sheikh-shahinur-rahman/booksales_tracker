name: booksales_tracker
description: "A professional book sales tracker app with inventory and profit tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  uuid: ^4.5.2
  local_auth: ^2.3.0
  share_plus: ^7.2.2
  file_picker: ^8.0.0
  mobile_scanner: ^7.1.4
  fl_chart: ^0.66.0
  url_launcher: ^6.2.5
  excel: ^4.0.6
  barcode_widget: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/data/ca.json
    - assets/image/
    - assets/fonts/

  fonts:
    - family: Bangla
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Black.ttf
          weight: 900
    - family: SolaimanLipi
      fonts:
        - asset: assets/fonts/SolaimanLipi.ttf
    - family: DhakarChithi
      fonts:
        - asset: assets/fonts/Dhakar Chithi OMJ.ttf
        - asset: assets/fonts/Dhakar Chithi MJ Bold.ttf
          weight: 700
